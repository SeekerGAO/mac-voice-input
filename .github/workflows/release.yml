name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Apple signing certificate
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' }}
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/signing-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build release package
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: ./scripts/release_package.sh "${GITHUB_REF_NAME}"

      - name: Prepare release notes
        run: |
          cat > "$RUNNER_TEMP/release-notes.md" <<'EOF'
          ## MacVoiceInput Release

          MacVoiceInput is a macOS menu bar voice input app with hold-to-talk recording, live speech recognition, and optional AI text refinement.

          ### Included in this release

          - Menu bar voice input workflow for macOS 14+
          - Hold `Fn` to record, release to transcribe and paste text
          - Live floating HUD with waveform meter and transcript preview
          - Permission diagnostics and onboarding flow
          - Optional OpenAI-compatible LLM refinement

          ### Download

          Download `MacVoiceInput-${GITHUB_REF_NAME}.dmg` from the assets below, open it, and drag `MacVoiceInput.app` into `Applications`.

          A `.zip` archive is also attached as a fallback download.

          ### Notes

          - The app requires Microphone, Speech Recognition, Accessibility, and Input Monitoring permissions
          - If this build is not Developer ID signed and notarized, macOS may ask the user to approve it manually on first launch
          EOF

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ runner.temp }}/release-notes.md
          files: |
            dist/*
