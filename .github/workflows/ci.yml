name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build app bundle
        run: make build

      - name: Archive app artifact
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent .build/release/MacVoiceInput.app dist/MacVoiceInput-ci.app.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: MacVoiceInput-ci-app
          path: dist/MacVoiceInput-ci.app.zip
          if-no-files-found: error
